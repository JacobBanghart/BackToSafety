name: Android Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-android-aab:
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure Android SDK and local.properties
        run: |
          set -euo pipefail

          SDKMANAGER_BIN="$(command -v sdkmanager || true)"
          if [ -z "$SDKMANAGER_BIN" ]; then
            echo "sdkmanager was not found on PATH after setup-android"
            exit 1
          fi

          SDK_PATH="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/android-sdk}}"
          mkdir -p "$SDK_PATH"

          set +o pipefail
          yes | "$SDKMANAGER_BIN" --sdk_root="$SDK_PATH" --licenses > /dev/null
          set -o pipefail
          "$SDKMANAGER_BIN" --sdk_root="$SDK_PATH" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

          echo "Using Android SDK at $SDK_PATH"
          echo "ANDROID_SDK_ROOT=$SDK_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$SDK_PATH" >> "$GITHUB_ENV"
          printf 'sdk.dir=%s\n' "$SDK_PATH" > android/local.properties

      - name: Install dependencies
        run: npm ci

      - name: Restore Android native build caches
        uses: actions/cache@v4
        with:
          path: |
            android/.gradle
            android/app/.cxx
          key: ${{ runner.os }}-android-native-${{ hashFiles('**/*.gradle*', '**/gradle.properties', 'android/gradle/wrapper/gradle-wrapper.properties', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-android-native-

      - name: Decode Android release keystore
        run: |
          mkdir -p android/app
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/app/release.keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Derive release version metadata from tag
        id: release_meta
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          elif [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="internal-build-${GITHUB_RUN_NUMBER}"
          fi

          VERSION_CODE="${GITHUB_RUN_NUMBER}"
          if echo "$VERSION" | grep -Eq '^internal-v[0-9]+\.[0-9]+\.[0-9]+-build[0-9]+$'; then
            VERSION_CODE="${VERSION##*build}"
          fi

          VERSION_NAME="$VERSION"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Build signed Android App Bundle
        run: ./gradlew bundleRelease -PRELEASE_VERSION_CODE=${{ steps.release_meta.outputs.version_code }} -PRELEASE_VERSION_NAME=${{ steps.release_meta.outputs.version_name }} --build-cache -Dorg.gradle.parallel=true -Dorg.gradle.workers.max=16
        working-directory: android
        env:
          NODE_ENV: production
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/android/app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Version AAB filename
        id: aab_meta
        run: |
          VERSION="${{ steps.release_meta.outputs.version }}"

          AAB_NAME="BackToSafety-${VERSION}.aab"
          cp android/app/build/outputs/bundle/release/app-release.aab "android/app/build/outputs/bundle/release/${AAB_NAME}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "aab_name=${AAB_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload signed AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab-${{ steps.aab_meta.outputs.version }}
          path: android/app/build/outputs/bundle/release/${{ steps.aab_meta.outputs.aab_name }}
          if-no-files-found: error

      - name: Attach AAB to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: android/app/build/outputs/bundle/release/${{ steps.aab_meta.outputs.aab_name }}
