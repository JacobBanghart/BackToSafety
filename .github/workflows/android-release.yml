name: Android Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-android-aab:
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Decode Android release keystore
        run: |
          mkdir -p android/app
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > android/app/release.keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build signed Android App Bundle
        run: ./gradlew bundleRelease --build-cache -Dorg.gradle.parallel=true -Dorg.gradle.workers.max=16
        working-directory: android
        env:
          NODE_ENV: production
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/android/app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Version AAB filename
        id: aab_meta
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          elif [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="build-${GITHUB_RUN_NUMBER}"
          fi

          AAB_NAME="BackToSafety-${VERSION}.aab"
          cp android/app/build/outputs/bundle/release/app-release.aab "android/app/build/outputs/bundle/release/${AAB_NAME}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "aab_name=${AAB_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload signed AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab-${{ steps.aab_meta.outputs.version }}
          path: android/app/build/outputs/bundle/release/${{ steps.aab_meta.outputs.aab_name }}
          if-no-files-found: error

      - name: Attach AAB to GitHub Release
        if: github.event_name == 'release'
        run: gh release upload "${{ github.event.release.tag_name }}" "android/app/build/outputs/bundle/release/${{ steps.aab_meta.outputs.aab_name }}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
